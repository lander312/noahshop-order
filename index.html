<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>養生堅果鋪 - 快速登記表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 隱藏數字輸入框的上下箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 產品資料庫 (含圖片連結)
        const PRODUCTS = [
            { id: 1, name: '杏仁果', image: 'https://duk.tw/geGAH9.jpg' },
            { id: 2, name: '腰果', image: 'https://duk.tw/5hVM88.jpg' },
            { id: 3, name: '南瓜子', image: 'https://duk.tw/MCdXpP.jpg' },
            { id: 4, name: '核桃', image: 'https://duk.tw/bXGXUh.jpg' },
            { id: 5, name: '胡桃', image: 'https://duk.tw/MheYV8.jpg' },
            { id: 6, name: '綜合堅果(小)', image: 'https://duk.tw/H7eqob.jpg' },
            { id: 7, name: '綜合堅果(大)', image: 'https://duk.tw/zlwlYT.jpg' },
            { id: 8, name: '松子', image: 'https://duk.tw/ZTnVKD.jpg' },
            { id: 9, name: '青葡萄乾', image: 'https://duk.tw/TARDjR.jpg' },
            { id: 10, name: '蔓越莓乾', image: 'https://duk.tw/JLDB61.jpg' },
            { id: 11, name: '野生藍莓乾', image: 'https://duk.tw/DX9191.jpg' },
            { id: 12, name: '黑芝麻粉', image: 'https://duk.tw/mwkH0r.jpg' },
            { id: 13, name: '中東椰棗', image: 'https://duk.tw/2UhsFb.jpg' },
            { id: 14, name: '夏威夷豆', image: 'https://duk.tw/WVpHiP.jpg' },
            { id: 15, name: '黑葡萄乾', image: 'https://duk.tw/QOYzfD.jpg' },
            { id: 16, name: '乳酪絲', image: 'https://duk.tw/i3IiR5.jpg' },
            { id: 17, name: '甘草橄欖', image: 'https://duk.tw/JoIsAS.jpg' },
            { id: 18, name: '無花果', image: 'https://duk.tw/fWR4Ab.jpg' },
            { id: 19, name: '開心果', image: 'https://duk.tw/ucxqkJ.jpg' },
            { id: 20, name: '紅麴納豆', image: 'https://duk.tw/faxmpn.jpg' },
            { id: 21, name: '黑豆', image: 'https://duk.tw/LxtkXO.jpg' },
            { id: 22, name: '梅子', image: 'https://duk.tw/O2M2ud.jpg' },
            { id: 23, name: '五行豆', image: 'https://duk.tw/tatgXk.jpg' },
        ];

        const App = () => {
            const [cart, setCart] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [notification, setNotification] = useState(null);
            
            // 新增功能狀態
            const [announcement, setAnnouncement] = useState('');
            const [includeAnnouncement, setIncludeAnnouncement] = useState(true);
            const [showSettings, setShowSettings] = useState(false);
            const [showImport, setShowImport] = useState(false);
            const [importText, setImportText] = useState('');

            // 購物車邏輯 - 加減按鈕
            const updateQuantity = (id, delta) => {
                setCart(prev => {
                    const currentQty = prev[id] || 0;
                    const newQty = Math.max(0, currentQty + delta);
                    return handleQtyChange(prev, id, newQty);
                });
            };

            // 購物車邏輯 - 直接輸入
            const setDirectQuantity = (id, value) => {
                setCart(prev => {
                    const newQty = parseInt(value, 10);
                    if (isNaN(newQty) || newQty < 0) return prev; // 無效輸入不處理
                    return handleQtyChange(prev, id, newQty);
                });
            };

            const handleQtyChange = (cartState, id, newQty) => {
                if (newQty === 0) {
                    const { [id]: _, ...rest } = cartState;
                    return rest;
                }
                return { ...cartState, [id]: newQty };
            };

            const clearCart = () => {
                if (window.confirm('確定要清空目前的所有登記嗎？')) {
                    setCart({});
                }
            };

            // 匯入文字解析邏輯
            const processImport = () => {
                if (!importText.trim()) return;
                
                const lines = importText.split('\n');
                const newCart = { ...cart };
                let matchCount = 0;

                PRODUCTS.forEach(product => {
                    lines.forEach(line => {
                        // 檢查該行是否包含商品名稱
                        if (line.includes(product.name)) {
                            // 擷取該行第一個出現的數字
                            const match = line.match(/\d+/);
                            if (match) {
                                newCart[product.id] = parseInt(match[0], 10);
                                matchCount++;
                            }
                        }
                    });
                });

                if (matchCount > 0) {
                    setCart(newCart);
                    setNotification({ msg: `成功解析 ${matchCount} 項商品`, type: 'success' });
                    setImportText('');
                    setShowImport(false);
                } else {
                    setNotification({ msg: '找不到對應的商品或數量格式', type: 'error' });
                }
                setTimeout(() => setNotification(null), 3000);
            };

            // 統計邏輯
            const summary = useMemo(() => {
                let totalQty = 0;
                const items = [];
                Object.entries(cart).forEach(([id, qty]) => {
                    const product = PRODUCTS.find(p => p.id === parseInt(id));
                    if (product) {
                        totalQty += qty;
                        items.push({ ...product, qty });
                    }
                });
                return { totalQty, items };
            }, [cart]);

            const filteredProducts = PRODUCTS.filter(p => p.name.includes(searchTerm));

            // 複製功能
            const copyToClipboard = () => {
                if (summary.items.length === 0) {
                    setNotification({ msg: '尚未選擇商品', type: 'error' });
                    setTimeout(() => setNotification(null), 2000);
                    return;
                }

                const date = new Date().toLocaleDateString('zh-TW');
                let text = `【訂購登記】${date}\n`;
                
                // 判斷是否加入公告
                if (includeAnnouncement && announcement.trim() !== '') {
                    text += `\n📌 公告：\n${announcement}\n\n`;
                }
                
                summary.items.forEach(item => {
                    text += `${item.name} x ${item.qty}\n`;
                });
                
                text += `------------------\n`;
                text += `總計: ${summary.totalQty} 包`;
                
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setNotification({ msg: '已複製明細！', type: 'success' });
                } catch (err) {
                    setNotification({ msg: '複製失敗', type: 'error' });
                }
                document.body.removeChild(textArea);
                setTimeout(() => setNotification(null), 3000);
            };

            // 重新渲染圖標
            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-sm relative pb-24">
                    
                    {/* 頂部導覽列 */}
                    <div className="sticky top-0 z-20 bg-white px-4 pt-4 pb-2 border-b border-slate-100 shadow-sm">
                        <div className="flex justify-between items-center mb-3">
                            <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="package" className="w-5 h-5 text-amber-600"></i>
                                快速登記表
                            </h2>
                            <div className="flex gap-2">
                                <button onClick={() => { setShowImport(true); setShowSettings(false); }} className="text-slate-500 hover:text-amber-600 bg-slate-50 p-2 rounded-full">
                                    <i data-lucide="clipboard-paste" className="w-4 h-4"></i>
                                </button>
                                <button onClick={() => { setShowSettings(!showSettings); setShowImport(false); }} className={`p-2 rounded-full transition-colors ${showSettings ? 'bg-amber-100 text-amber-700' : 'bg-slate-50 text-slate-500'}`}>
                                    <i data-lucide="megaphone" className="w-4 h-4"></i>
                                </button>
                                {summary.totalQty > 0 && (
                                    <button onClick={clearCart} className="text-red-500 hover:bg-red-50 bg-slate-50 p-2 rounded-full">
                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* 搜尋欄 */}
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                            <input 
                                type="text" 
                                placeholder="搜尋品名..." 
                                className="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-amber-500 transition-colors"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                    </div>

                    {/* 公告設定區塊 (展開/收合) */}
                    {showSettings && (
                        <div className="p-4 bg-amber-50/50 border-b border-amber-100 animate-in fade-in slide-in-from-top-2">
                            <label className="block text-sm font-bold text-slate-700 mb-2">公告內容設定</label>
                            <textarea 
                                value={announcement}
                                onChange={(e) => setAnnouncement(e.target.value)}
                                placeholder="請輸入欲公告的內容 (例如: 匯款帳號、預計出貨日...)"
                                className="w-full p-2 border border-slate-200 rounded bg-white text-sm focus:outline-none focus:border-amber-400 mb-2"
                                rows="3"
                            ></textarea>
                            <label className="flex items-center gap-2 cursor-pointer text-sm text-slate-600">
                                <input 
                                    type="checkbox" 
                                    checked={includeAnnouncement}
                                    onChange={(e) => setIncludeAnnouncement(e.target.checked)}
                                    className="w-4 h-4 text-amber-600 rounded border-slate-300 focus:ring-amber-500 accent-amber-600"
                                />
                                複製時包含此公告
                            </label>
                        </div>
                    )}

                    {/* 匯入訂單區塊 (展開/收合) */}
                    {showImport && (
                        <div className="p-4 bg-blue-50/50 border-b border-blue-100 animate-in fade-in slide-in-from-top-2">
                            <div className="flex justify-between items-center mb-2">
                                <label className="block text-sm font-bold text-slate-700">匯入舊訂單文字</label>
                                <button onClick={() => setShowImport(false)} className="text-slate-400"><i data-lucide="x" className="w-4 h-4"></i></button>
                            </div>
                            <p className="text-xs text-slate-500 mb-2">請貼上先前的訂單紀錄 (需包含商品名稱與數字，例如：杏仁果 x 2)</p>
                            <textarea 
                                value={importText}
                                onChange={(e) => setImportText(e.target.value)}
                                placeholder="杏仁果 x 2&#10;腰果 3包"
                                className="w-full p-2 border border-slate-200 rounded bg-white text-sm focus:outline-none focus:border-blue-400 mb-2"
                                rows="4"
                            ></textarea>
                            <button 
                                onClick={processImport}
                                className="w-full py-2 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700 transition-colors"
                            >
                                執行解析帶入
                            </button>
                        </div>
                    )}

                    {/* 列表清單 */}
                    <div className="p-4 space-y-3">
                        {filteredProducts.map(product => {
                            const qty = cart[product.id] || 0;
                            return (
                                <div key={product.id} className={`flex items-center p-2 rounded-lg border transition-all ${qty > 0 ? 'border-amber-400 bg-amber-50/30' : 'border-slate-100 bg-white'}`}>
                                    
                                    <div className="w-12 h-12 flex-shrink-0 bg-slate-100 rounded-md overflow-hidden mr-3">
                                        <img 
                                            src={product.image} 
                                            alt={product.name}
                                            className="w-full h-full object-cover"
                                            onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1546552696-7d5f4e89b0e8?w=100&q=80"; }}
                                        />
                                    </div>

                                    <div className="flex-1 font-medium text-sm sm:text-base text-slate-700">
                                        {product.name}
                                    </div>
                                    
                                    {/* 數量控制 (更新為 Input) */}
                                    <div className="flex items-center gap-1 bg-slate-50 rounded-full border border-slate-200 p-1">
                                        <button 
                                            onClick={() => updateQuantity(product.id, -1)}
                                            className="w-7 h-7 flex items-center justify-center rounded-full text-slate-500 active:bg-slate-200 hover:bg-slate-200 bg-white shadow-sm"
                                        >
                                            <i data-lucide="minus" className="w-3 h-3"></i>
                                        </button>
                                        
                                        <input 
                                            type="number"
                                            min="0"
                                            value={qty || ''}
                                            placeholder="0"
                                            onChange={(e) => setDirectQuantity(product.id, e.target.value)}
                                            className={`w-8 text-center text-sm font-bold bg-transparent focus:outline-none ${qty > 0 ? 'text-amber-600' : 'text-slate-400'}`}
                                        />

                                        <button 
                                            onClick={() => updateQuantity(product.id, 1)}
                                            className="w-7 h-7 flex items-center justify-center rounded-full bg-slate-800 text-white active:scale-95 hover:bg-slate-700 shadow-sm"
                                        >
                                            <i data-lucide="plus" className="w-3 h-3"></i>
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* 底部固定按鈕 */}
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-slate-100 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-30">
                        <div className="max-w-md mx-auto flex gap-3">
                            <div className="flex-1 bg-slate-100 rounded-lg flex items-center justify-center text-slate-600 font-medium">
                                共 {summary.totalQty} 包
                            </div>
                            <button
                                onClick={copyToClipboard}
                                disabled={summary.totalQty === 0}
                                className="flex-[2] bg-amber-600 text-white py-3 rounded-lg font-bold shadow-md active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2 hover:bg-amber-700 transition-colors"
                            >
                                {notification ? (
                                    <>
                                        <i data-lucide="check-circle" className="w-5 h-5"></i>
                                        {notification.msg}
                                    </>
                                ) : (
                                    <>
                                        <i data-lucide="copy" className="w-5 h-5"></i>
                                        複製清單
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
